services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: planning_poker
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./planning-poker-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/planning_poker
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./planning-poker-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: