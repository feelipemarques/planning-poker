name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

jobs:

    backend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup JDK (21)
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'temurin'

            - name: Run tests
              working-directory: ./planning-poker-backend
              run: mvn test

            - name: Build backend
              working-directory: ./planning-poker-backend
              run: mvn clean package -DskipTests
    frontend:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Install dependencies
          working-directory: ./planning-poker-frontend
          run: npm install

        - name: Build frontend
          working-directory: ./planning-poker-frontend
          run: npm run build