<div class="table">
  <div class="title-block">
    <h1>Planning Poker</h1>
    <div class="divider"><div class="divider-diamond"></div></div>
    <p class="subtitle">Agile Estimation Table</p>
  </div>

  <div class="cards-layout">

    <!-- Create Room Card -->
    <div class="card">
      <div class="card-suit">♠</div>
      <h3>Deal a New Room</h3>
      <div class="field">
        <input type="text" [(ngModel)]="nickname" placeholder="Your nickname" />
      </div>
      <button class="btn" (click)="createRoom()">Create Room</button>
    </div>

    <!-- Join Room Card -->
    <div class="card">
      <div class="card-suit">♥</div>
      <h3>Join the Table</h3>
      <div class="field">
        <input type="text" [(ngModel)]="nickname" placeholder="Your nickname" />
      </div>
      <div class="field">
        <input type="text" [(ngModel)]="roomCode" placeholder="Room code" />
      </div>
      <button class="btn" (click)="joinRoom()">Take a Seat</button>
    </div>

  </div>

  <div class="chips-decoration">
    <div class="chip chip-r"></div>
    <div class="chip chip-b"></div>
    <div class="chip chip-g"></div>
    <div class="chip chip-r"></div>
    <div class="chip chip-b"></div>
  </div>
</div>
